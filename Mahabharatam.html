<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mahabharatam | VITAP-Amaravati</title>

<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600;800&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/tsparticles@2/tsparticles.bundle.min.js"></script>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Cinzel', serif;
scroll-behavior:smooth;
cursor:url('https://cur.cursors-4u.net/cursors/cur-13/cur1144.cur'), auto;
}

body{
background:black;
color:white;
overflow-x:hidden;
position:relative;
}

/* Fire particles everywhere */
#tsparticles{
position:fixed;
width:100%;
height:100%;
z-index:-2;
}

/* Sudarshan Chakra Background */
.chakra{
position:fixed;
top:50%;
left:50%;
width:500px;
height:500px;
background:url('https://upload.wikimedia.org/wikipedia/commons/thumb/4/4f/Sudarshana_Chakra.svg/1024px-Sudarshana_Chakra.svg.png') center/contain no-repeat;
transform:translate(-50%, -50%);
opacity:0.15;
z-index:-1;
animation:rotateChakra 40s linear infinite;
filter:drop-shadow(0 0 40px #00bfff);
}

@keyframes rotateChakra{
from{transform:translate(-50%, -50%) rotate(0deg);}
to{transform:translate(-50%, -50%) rotate(360deg);}
}

/* Hero Section */
.hero{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
text-align:center;
position:relative;
padding:20px;
}

.hero-content{
animation:fadeDown 2s ease;
}

h1{
font-size:60px;
color:gold;
text-shadow:0 0 30px orange;
letter-spacing:4px;
}

.details{
margin-top:20px;
font-size:20px;
}

.register-btn{
margin-top:30px;
padding:15px 40px;
border:none;
border-radius:40px;
background:gold;
color:black;
font-size:18px;
cursor:pointer;
transition:0.4s;
}

.register-btn:hover{
background:orange;
transform:scale(1.1);
}

/* Registration Section */
.section{
padding:100px 20px;
text-align:center;
background:rgba(0,0,0,0.6);
backdrop-filter:blur(5px);
}

form{
max-width:400px;
margin:auto;
display:flex;
flex-direction:column;
gap:20px;
margin-top:30px;
}

input{
padding:15px;
border:none;
border-radius:10px;
font-size:16px;
}

.submit-btn{
padding:15px;
background:gold;
border:none;
border-radius:40px;
font-size:18px;
cursor:pointer;
transition:0.3s;
}

.submit-btn:hover{
background:orange;
transform:scale(1.05);
}

.counter{
font-size:24px;
margin-top:25px;
color:gold;
}

#message{
margin-top:20px;
font-size:18px;
}

footer{
background:black;
padding:20px;
text-align:center;
}

@keyframes fadeDown{
from{opacity:0;transform:translateY(-50px);}
to{opacity:1;transform:translateY(0);}
}

@media(max-width:768px){
h1{font-size:36px;}
.chakra{width:300px;height:300px;}
}
</style>
</head>

<body>

<div id="tsparticles"></div>
<div class="chakra"></div>

<!-- HERO -->
<section class="hero">
<div class="hero-content">
<h1>MAHABHARATAM</h1>

<div class="details">
<p>📍 AB2 - Auditorium</p>
<p>⏰ 3PM to 6PM</p>
<p>🎓 VITAP-Amaravati</p>
</div>

<button class="register-btn" onclick="document.getElementById('register').scrollIntoView();">
Register Here
</button>
</div>
</section>

<!-- REGISTRATION -->
<section id="register" class="section">
<h2 style="color:gold;">Register Now</h2>

<form id="registrationForm">
<input type="text" id="name" placeholder="Full Name" required>
<input type="text" id="regno" placeholder="Registration Number" required>
<input type="email" id="email" placeholder="Email ID" required>
<button type="submit" class="submit-btn">Submit</button>
</form>

<p id="message"></p>

<div class="counter">
Total Registrations: <span id="count">0</span>
</div>

</section>

<footer>
© 2026 Mahabharatam | VITAP-Amaravati
</footer>

<script>
const supabaseUrl = "https://zhmazqothtpwrgmzermw.supabase.co";
const supabaseKey = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InpobWF6cW90aHRwd3JnbXplcm13Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIzMzY2MjgsImV4cCI6MjA4NzkxMjYyOH0.Fc1PDrH9oJiIrn8HanhhKi0DfI4sIqyOwEToAYb52yo";

const { createClient } = supabase;
const client = createClient(supabaseUrl, supabaseKey);

async function updateCount(){
const { count } = await client
.from("registrations")
.select("*", { count: "exact", head: true });

document.getElementById("count").innerText = count || 0;
}
updateCount();

document.getElementById("registrationForm").addEventListener("submit", async (e)=>{
e.preventDefault();

const name = document.getElementById("name").value;
const regno = document.getElementById("regno").value;
const email = document.getElementById("email").value;

const { error } = await client
.from("registrations")
.insert([{ name, regno, email }]);

const message = document.getElementById("message");

if(error){
message.style.color="red";
message.innerText="Error submitting registration!";
}else{
message.style.color="lightgreen";
message.innerText="Registration Successful!";
document.getElementById("registrationForm").reset();
updateCount();
}
});

/* Fire particles */
tsParticles.load("tsparticles",{
particles:{
number:{value:120},
color:{value:["#ff6600","#ff3300","#ffaa00"]},
shape:{type:"circle"},
opacity:{value:0.6},
size:{value:3},
move:{enable:true,speed:2}
},
background:{color:"transparent"}
});
</script>

</body>
</html>
