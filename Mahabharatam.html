<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mahabharatam | VITAP-Amaravati</title>

<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700;900&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/tsparticles@2/tsparticles.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Cinzel', serif;
scroll-behavior:smooth;
cursor:url('https://cur.cursors-4u.net/cursors/cur-13/cur1144.cur'), auto;
}

body{
background:black;
color:white;
overflow-x:hidden;
}

/* Fire Background */
#tsparticles{
position:fixed;
width:100%;
height:100%;
z-index:-3;
}

/* Chakra */
.chakra{
position:fixed;
top:50%;
left:50%;
width:500px;
height:500px;
background:url('https://upload.wikimedia.org/wikipedia/commons/thumb/4/4f/Sudarshana_Chakra.svg/1024px-Sudarshana_Chakra.svg.png') center/contain no-repeat;
transform:translate(-50%, -50%);
opacity:0.15;
z-index:-2;
animation:rotateChakra 40s linear infinite;
filter:drop-shadow(0 0 40px #00bfff);
}

@keyframes rotateChakra{
from{transform:translate(-50%, -50%) rotate(0deg);}
to{transform:translate(-50%, -50%) rotate(360deg);}
}

/* Lightning */
.lightning{
position:fixed;
width:100%;
height:100%;
background:white;
opacity:0;
z-index:-1;
animation:flash 15s infinite;
pointer-events:none;
}

@keyframes flash{
0%,97%,100%{opacity:0;}
98%{opacity:0.15;}
99%{opacity:0;}
}

/* Fire Burst */
.fireburst{
position:fixed;
width:100%;
height:100%;
background:radial-gradient(circle, orange 0%, red 40%, black 80%);
opacity:0;
z-index:10;
pointer-events:none;
}

.fireburst.active{
animation:burst 2s forwards;
}

@keyframes burst{
0%{opacity:0;}
20%{opacity:0.9;}
100%{opacity:0;}
}

/* Hero */
.hero{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
text-align:center;
position:relative;
padding:20px;
}

.hero-content{
position:relative;
animation:fadeDown 2s ease;
}

h1{
font-size:65px;
letter-spacing:5px;
color:gold;
animation:glow 3s ease-in-out infinite alternate;
}

@keyframes glow{
from{text-shadow:0 0 10px gold,0 0 20px orange;}
to{text-shadow:0 0 30px gold,0 0 60px orange;}
}

.hero-content::after{
content:"";
position:absolute;
width:600px;
height:600px;
border-radius:50%;
background:radial-gradient(circle, rgba(255,215,0,0.4) 0%, rgba(0,0,0,0) 70%);
top:50%;
left:50%;
transform:translate(-50%,-50%);
z-index:-1;
animation:pulse 4s infinite;
}

@keyframes pulse{
0%{transform:translate(-50%,-50%) scale(1);}
50%{transform:translate(-50%,-50%) scale(1.2);}
100%{transform:translate(-50%,-50%) scale(1);}
}

.details{
margin-top:20px;
font-size:20px;
}

.register-btn{
margin-top:30px;
padding:15px 40px;
border:none;
border-radius:40px;
background:gold;
color:black;
font-size:18px;
cursor:pointer;
transition:0.4s;
}

.register-btn:hover{
background:orange;
transform:scale(1.1);
}

.section{
padding:100px 20px;
text-align:center;
background:rgba(0,0,0,0.6);
backdrop-filter:blur(6px);
}

form{
max-width:400px;
margin:auto;
display:flex;
flex-direction:column;
gap:20px;
margin-top:30px;
}

input{
padding:15px;
border:none;
border-radius:10px;
font-size:16px;
}

.submit-btn{
padding:15px;
background:gold;
border:none;
border-radius:40px;
font-size:18px;
cursor:pointer;
}

.counter{
margin-top:20px;
font-size:22px;
color:gold;
}

.pop-effect{
animation:pop 0.6s ease;
}

@keyframes pop{
0%{transform:scale(0.5);opacity:0;}
70%{transform:scale(1.2);opacity:1;}
100%{transform:scale(1);}
}

footer{
background:black;
padding:20px;
text-align:center;
}

@keyframes fadeDown{
from{opacity:0;transform:translateY(-50px);}
to{opacity:1;transform:translateY(0);}
}

@media(max-width:768px){
h1{font-size:36px;}
.chakra{width:300px;height:300px;}
}
</style>
</head>

<body>

<div id="tsparticles"></div>
<div class="chakra"></div>
<div class="lightning"></div>
<div class="fireburst" id="fireburst"></div>

<audio id="bgMusic" loop>
<source src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_59c2b94b79.mp3" type="audio/mp3">
</audio>

<!-- Krishna Flute Sound -->
<audio id="fluteSound">
<source src="https://cdn.pixabay.com/download/audio/2021/08/04/audio_3f07c7b9a3.mp3" type="audio/mp3">
</audio>

<section class="hero">
<div class="hero-content">
<h1>MAHABHARATAM</h1>

<div class="details">
<p>📅 March 14</p>
<p>📍 AB2 - Auditorium</p>
<p>⏰ 3PM to 6PM</p>
<p>🎓 VITAP-Amaravati</p>
</div>

<div id="countdown" style="margin-top:20px;font-size:22px;color:gold;">
⏳ Event Starts In: <span id="timer"></span>
</div>

<button class="register-btn" onclick="document.getElementById('register').scrollIntoView();">
Register Here
</button>
</div>
</section>

<section id="register" class="section">
<h2 style="color:gold;">Register Now</h2>

<form id="registrationForm">
<input type="text" id="name" placeholder="Full Name" required>
<input type="text" id="regno" placeholder="Registration Number" required>
<input type="email" id="email" placeholder="Email ID" required>
<button type="submit" class="submit-btn">Submit</button>
</form>

<p id="message"></p>

<div class="counter">
Total Registrations: <span id="count">0</span>
</div>
</section>

<footer>
© 2026 Mahabharatam | VITAP-Amaravati
</footer>

<script>
const supabaseUrl="https://zhmazqothtpwrgmzermw.supabase.co";
const supabaseKey="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InpobWF6cW90aHRwd3JnbXplcm13Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIzMzY2MjgsImV4cCI6MjA4NzkxMjYyOH0.Fc1PDrH9oJiIrn8HanhhKi0DfI4sIqyOwEToAYb52yo";
const { createClient } = supabase;
const client=createClient(supabaseUrl,supabaseKey);

/* Countdown */
const eventDate=new Date("March 14, 2026 15:00:00").getTime();
const timerElement=document.getElementById("timer");

const countdown=setInterval(function(){
const now=new Date().getTime();
const distance=eventDate-now;

if(distance<0){
clearInterval(countdown);
document.getElementById("countdown").innerHTML="<span style='color:red;'>🔥 The Play Started 🔥</span>";
document.getElementById("registrationForm").style.display="none";
document.querySelector(".counter").style.display="none";
document.getElementById("fireburst").classList.add("active");
return;
}

const days=Math.floor(distance/(1000*60*60*24));
const hours=Math.floor((distance%(1000*60*60*24))/(1000*60*60));
const minutes=Math.floor((distance%(1000*60*60))/(1000*60));
const seconds=Math.floor((distance%(1000*60))/1000);

timerElement.innerHTML=days+"d "+hours+"h "+minutes+"m "+seconds+"s";

},1000);

/* Update Count */
async function updateCount(){
const { count }=await client.from("registrations").select("*",{count:"exact",head:true});
document.getElementById("count").innerText=count||0;
}
updateCount();

/* Registration */
document.getElementById("registrationForm").addEventListener("submit",async(e)=>{
e.preventDefault();

const name=document.getElementById("name").value;
const regno=document.getElementById("regno").value;
const email=document.getElementById("email").value;

const { error }=await client.from("registrations").insert([{name,regno,email}]);

if(error){
document.getElementById("message").style.color="red";
document.getElementById("message").innerText="Error submitting!";
}else{

const msg=document.getElementById("message");
msg.style.color="lightgreen";
msg.innerText="🎉 Registration Successful!";
msg.classList.add("pop-effect");
setTimeout(()=>{msg.classList.remove("pop-effect");},600);

updateCount();
document.getElementById("registrationForm").reset();

/* Confetti */
confetti({
particleCount:200,
spread:120,
origin:{y:0.6}
});

/* Krishna Flute Sound */
document.getElementById("fluteSound").play();
}
});

/* Fire particles */
tsParticles.load("tsparticles",{
particles:{
number:{value:120},
color:{value:["#ff6600","#ff3300","#ffaa00"]},
shape:{type:"circle"},
opacity:{value:0.6},
size:{value:3},
move:{enable:true,speed:2}
}
});

/* Music */
const music=document.getElementById("bgMusic");
music.volume=0.4;
document.body.addEventListener("click",()=>{music.play();},{once:true});
</script>

</body>
</html>
