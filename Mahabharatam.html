<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mahabharatam | VITAP-Amaravati</title>

<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700;900&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/tsparticles@2/tsparticles.bundle.min.js"></script>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Cinzel', serif;
scroll-behavior:smooth;
cursor:url('https://cur.cursors-4u.net/cursors/cur-13/cur1144.cur'), auto;
}

body{
background:black;
color:white;
overflow-x:hidden;
}

/* Fire */
#tsparticles{
position:fixed;
width:100%;
height:100%;
z-index:-3;
}

/* Chakra */
.chakra{
position:fixed;
top:50%;
left:50%;
width:500px;
height:500px;
background:url('https://upload.wikimedia.org/wikipedia/commons/thumb/4/4f/Sudarshana_Chakra.svg/1024px-Sudarshana_Chakra.svg.png') center/contain no-repeat;
transform:translate(-50%, -50%);
opacity:0.15;
z-index:-2;
animation:rotateChakra 40s linear infinite;
filter:drop-shadow(0 0 40px #00bfff);
}

@keyframes rotateChakra{
from{transform:translate(-50%, -50%) rotate(0deg);}
to{transform:translate(-50%, -50%) rotate(360deg);}
}

/* Lightning */
.lightning{
position:fixed;
width:100%;
height:100%;
background:white;
opacity:0;
z-index:-1;
animation:flash 8s infinite;
}

@keyframes flash{
0%,95%,100%{opacity:0;}
96%{opacity:0.8;}
97%{opacity:0;}
98%{opacity:0.6;}
99%{opacity:0;}
}

/* Hero */
.hero{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
text-align:center;
position:relative;
padding:20px;
}

.hero-content{
animation:fadeDown 2s ease;
position:relative;
}

/* Title Glow */
h1{
font-size:65px;
letter-spacing:5px;
color:gold;
animation:glow 3s ease-in-out infinite alternate;
}

@keyframes glow{
from{text-shadow:0 0 10px gold,0 0 20px orange;}
to{text-shadow:0 0 30px gold,0 0 60px orange;}
}

/* Divine Aura */
.hero-content::after{
content:"";
position:absolute;
width:600px;
height:600px;
border-radius:50%;
background:radial-gradient(circle, rgba(255,215,0,0.4) 0%, rgba(0,0,0,0) 70%);
top:50%;
left:50%;
transform:translate(-50%,-50%);
z-index:-1;
animation:pulse 4s infinite;
}

@keyframes pulse{
0%{transform:translate(-50%,-50%) scale(1);}
50%{transform:translate(-50%,-50%) scale(1.2);}
100%{transform:translate(-50%,-50%) scale(1);}
}

.details{
margin-top:20px;
font-size:20px;
}

.register-btn{
margin-top:30px;
padding:15px 40px;
border:none;
border-radius:40px;
background:gold;
color:black;
font-size:18px;
cursor:pointer;
transition:0.4s;
}

.register-btn:hover{
background:orange;
transform:scale(1.1);
}

/* Registration */
.section{
padding:100px 20px;
text-align:center;
background:rgba(0,0,0,0.6);
backdrop-filter:blur(6px);
}

form{
max-width:400px;
margin:auto;
display:flex;
flex-direction:column;
gap:20px;
margin-top:30px;
}

input{
padding:15px;
border:none;
border-radius:10px;
font-size:16px;
}

.submit-btn{
padding:15px;
background:gold;
border:none;
border-radius:40px;
font-size:18px;
cursor:pointer;
}

.counter{
margin-top:20px;
font-size:22px;
color:gold;
}

footer{
background:black;
padding:20px;
text-align:center;
}

@keyframes fadeDown{
from{opacity:0;transform:translateY(-50px);}
to{opacity:1;transform:translateY(0);}
}

@media(max-width:768px){
h1{font-size:36px;}
.chakra{width:300px;height:300px;}
}
</style>
</head>

<body>

<div id="tsparticles"></div>
<div class="chakra"></div>
<div class="lightning"></div>

<audio autoplay loop>
<source src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_59c2b94b79.mp3?filename=epic-cinematic-background-music-110199.mp3" type="audio/mp3">
</audio>

<section class="hero">
<div class="hero-content">
<h1>MAHABHARATAM</h1>

<div class="details">
<p>📅 March 14</p>
<p>📍 AB2 - Auditorium</p>
<p>⏰ 3PM to 6PM</p>
<p>🎓 VITAP-Amaravati</p>
</div>

<button class="register-btn" onclick="document.getElementById('register').scrollIntoView();">
Register Here
</button>
</div>
</section>

<section id="register" class="section">
<h2 style="color:gold;">Register Now</h2>

<form id="registrationForm">
<input type="text" id="name" placeholder="Full Name" required>
<input type="text" id="regno" placeholder="Registration Number" required>
<input type="email" id="email" placeholder="Email ID" required>
<button type="submit" class="submit-btn">Submit</button>
</form>

<p id="message"></p>
<div class="counter">
Total Registrations: <span id="count">0</span>
</div>
</section>

<footer>
© 2026 Mahabharatam | VITAP-Amaravati
</footer>

<script>
const supabaseUrl="https://zhmazqothtpwrgmzermw.supabase.co";
const supabaseKey="YOUR_ANON_KEY_HERE";

const { createClient } = supabase;
const client=createClient(supabaseUrl,supabaseKey);

async function updateCount(){
const { count }=await client
.from("registrations")
.select("*",{count:"exact",head:true});
document.getElementById("count").innerText=count||0;
}
updateCount();

document.getElementById("registrationForm").addEventListener("submit",async(e)=>{
e.preventDefault();
const name=document.getElementById("name").value;
const regno=document.getElementById("regno").value;
const email=document.getElementById("email").value;

const { error }=await client
.from("registrations")
.insert([{name,regno,email}]);

if(error){
document.getElementById("message").innerText="Error submitting!";
}else{
document.getElementById("message").innerText="Registration Successful!";
document.getElementById("registrationForm").reset();
updateCount();
}
});

tsParticles.load("tsparticles",{
particles:{
number:{value:120},
color:{value:["#ff6600","#ff3300","#ffaa00"]},
shape:{type:"circle"},
opacity:{value:0.6},
size:{value:3},
move:{enable:true,speed:2}
}
});
</script>

</body>
</html>
