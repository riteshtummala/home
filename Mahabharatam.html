<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mahabharatam | VITAP-Amaravati</title>

<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700;900&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/tsparticles@2/tsparticles.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Cinzel', serif;
scroll-behavior:smooth;
}

body{
background:black;
color:white;
overflow-x:hidden;
}

#tsparticles{
position:fixed;
width:100%;
height:100%;
z-index:-3;
}

.chakra{
position:fixed;
top:50%;
left:50%;
width:500px;
height:500px;
background:url('https://upload.wikimedia.org/wikipedia/commons/thumb/4/4f/Sudarshana_Chakra.svg/1024px-Sudarshana_Chakra.svg.png') center/contain no-repeat;
transform:translate(-50%, -50%);
opacity:0.15;
z-index:-2;
animation:rotateChakra 40s linear infinite;
filter:drop-shadow(0 0 40px #00bfff);
}

@keyframes rotateChakra{
from{transform:translate(-50%, -50%) rotate(0deg);}
to{transform:translate(-50%, -50%) rotate(360deg);}
}

.lightning{
position:fixed;
width:100%;
height:100%;
background:white;
opacity:0;
z-index:-1;
animation:flash 15s infinite;
pointer-events:none;
}

@keyframes flash{
0%,97%,100%{opacity:0;}
98%{opacity:0.15;}
99%{opacity:0;}
}

.fireburst{
position:fixed;
width:100%;
height:100%;
background:radial-gradient(circle, orange 0%, red 40%, black 80%);
opacity:0;
z-index:10;
pointer-events:none;
}

.fireburst.active{
animation:burst 2s forwards;
}

@keyframes burst{
0%{opacity:0;}
20%{opacity:0.9;}
100%{opacity:0;}
}

.hero{
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
text-align:center;
padding:40px 20px;
}

.hero-content{
animation:fadeDown 2s ease;
}

h1{
font-size:65px;
letter-spacing:5px;
color:gold;
animation:glow 3s ease-in-out infinite alternate;
}

@keyframes glow{
from{text-shadow:0 0 10px gold,0 0 20px orange;}
to{text-shadow:0 0 30px gold,0 0 60px orange;}
}

.details{
margin-top:20px;
font-size:20px;
line-height:1.8;
}

.register-btn{
margin-top:30px;
padding:15px 40px;
border:none;
border-radius:40px;
background:gold;
color:black;
font-size:18px;
cursor:pointer;
transition:0.4s;
}

.register-btn:hover{
background:orange;
transform:scale(1.1);
}

.section{
padding:100px 20px;
text-align:center;
background:rgba(0,0,0,0.6);
backdrop-filter:blur(6px);
}

form{
max-width:400px;
margin:auto;
display:flex;
flex-direction:column;
gap:20px;
margin-top:30px;
}

input, select{
padding:15px;
border:none;
border-radius:10px;
font-size:16px;
width:100%;
}

.submit-btn{
padding:15px;
background:gold;
border:none;
border-radius:40px;
font-size:18px;
cursor:pointer;
}

.counter{
margin-top:20px;
font-size:22px;
color:gold;
}

.pop-effect{
animation:pop 0.6s ease;
}

@keyframes pop{
0%{transform:scale(0.5);opacity:0;}
70%{transform:scale(1.2);opacity:1;}
100%{transform:scale(1);}
}

footer{
background:black;
padding:20px;
text-align:center;
font-size:14px;
}

@media(max-width:768px){
h1{font-size:38px;}
.section{padding:60px 20px;}
}

@media(max-width:480px){
h1{font-size:28px;}
form{max-width:100%;}
footer{font-size:12px;}
}
</style>
</head>

<body>

<div id="tsparticles"></div>
<div class="chakra"></div>
<div class="lightning"></div>
<div class="fireburst" id="fireburst"></div>

<section class="hero">
<div class="hero-content">
<h1>MAHABHARATAM</h1>

<div class="details">
<p>📅 March 14</p>
<p>📍 AB2 - Auditorium</p>
<p>⏰ 3PM to 6PM</p>
<p>🎓 VITAP-Amaravati</p>
</div>

<div id="countdown" style="margin-top:20px;font-size:22px;color:gold;">
⏳ Event Starts In: <span id="timer"></span>
</div>

<button class="register-btn" onclick="document.getElementById('register').scrollIntoView();">
Register Here
</button>
</div>
</section>

<section id="register" class="section">
<h2 style="color:gold;">Register Now</h2>

<form id="registrationForm">
<input type="text" id="name" placeholder="Full Name" required>
<input type="text" id="regno" placeholder="Registration Number" required>
<input type="email" id="email" placeholder="Email ID" required>

<!-- NEW DROPDOWN -->
<select id="employment" required>
<option value="">Select Employment Type</option>
<option value="Student">Student</option>
<option value="Research Scholar">Research Scholar</option>
<option value="Faculty">Faculty</option>
<option value="Other">Other</option>
</select>

<button type="submit" class="submit-btn">Submit</button>
</form>

<p id="message"></p>

<div class="counter">
Total Registrations: <span id="count">0</span>
</div>
</section>

<footer>
© 2026 Mahabharatam | VITAP-Amaravati
</footer>

<script>
const SUPABASE_URL="https://zhmazqothtpwrgmzermw.supabase.co";
const SUPABASE_KEY="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InpobWF6cW90aHRwd3JnbXplcm13Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIzMzY2MjgsImV4cCI6MjA4NzkxMjYyOH0.Fc1PDrH9oJiIrn8HanhhKi0DfI4sIqyOwEToAYb52yo";
const client = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

/* Countdown */
const eventDate=new Date("March 14, 2026 15:00:00").getTime();
const timer=document.getElementById("timer");

const countdown=setInterval(()=>{
const now=new Date().getTime();
const distance=eventDate-now;

if(distance<0){
clearInterval(countdown);
document.getElementById("countdown").innerHTML="<span style='color:red;'>🔥 The Play Started 🔥</span>";
document.getElementById("registrationForm").style.display="none";
document.querySelector(".counter").style.display="none";
document.getElementById("fireburst").classList.add("active");
return;
}

const days=Math.floor(distance/(1000*60*60*24));
const hours=Math.floor((distance%(1000*60*60*24))/(1000*60*60));
const minutes=Math.floor((distance%(1000*60*60))/(1000*60));
const seconds=Math.floor((distance%(1000*60))/1000);

timer.innerHTML=`${days}d ${hours}h ${minutes}m ${seconds}s`;
},1000);

async function updateCount(){
try{
const { count }=await client.from("registrations").select("*",{count:"exact",head:true});
document.getElementById("count").innerText=count||0;
}catch{}
}
updateCount();

document.getElementById("registrationForm").addEventListener("submit",async(e)=>{
e.preventDefault();

const name=document.getElementById("name").value;
const regno=document.getElementById("regno").value;
const email=document.getElementById("email").value.toLowerCase();;
const employment=document.getElementById("employment").value;

try{
const { error }=await client.from("registrations")
.insert([{name,regno,email,employment}]);

if(error) throw error;

const msg=document.getElementById("message");
msg.style.color="lightgreen";
msg.innerText="🎉 Registration Successful!";
msg.classList.add("pop-effect");
setTimeout(()=>{msg.classList.remove("pop-effect");},600);

updateCount();
document.getElementById("registrationForm").reset();
confetti({particleCount:200,spread:120,origin:{y:0.6}});
}catch{
document.getElementById("message").style.color="red";
document.getElementById("message").innerText="Error submitting!";
}
});

tsParticles.load("tsparticles",{
particles:{
number:{value:120},
color:{value:["#ff6600","#ff3300","#ffaa00"]},
shape:{type:"circle"},
opacity:{value:0.6},
size:{value:3},
move:{enable:true,speed:2}
}
});
</script>

</body>
</html>
