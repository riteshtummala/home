<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Mahabharatam | VITAP-Amaravati</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Google Font -->
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600;800&display=swap" rel="stylesheet">

  <!-- Supabase CDN -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:'Cinzel', serif;
      scroll-behavior:smooth;
    }

    body{
      color:white;
      background:black;
      overflow-x:hidden;
    }

    /* Hero Section */
    .hero{
      height:100vh;
      background:url('https://images.unsplash.com/photo-1608889175501-df3c2c0bb77e') center/cover no-repeat;
      display:flex;
      flex-direction:column;
      justify-content:center;
      align-items:center;
      text-align:center;
      padding:20px;
      animation:fadeIn 2s ease-in;
    }

    .overlay{
      background:rgba(0,0,0,0.7);
      position:absolute;
      top:0;
      left:0;
      width:100%;
      height:100%;
      z-index:1;
    }

    .hero-content{
      position:relative;
      z-index:2;
      animation:slideDown 1.5s ease;
    }

    h1{
      font-size:60px;
      letter-spacing:4px;
      color:gold;
      text-shadow:0 0 20px orange;
    }

    .details{
      margin-top:20px;
      font-size:20px;
    }

    .register-btn{
      margin-top:30px;
      padding:15px 40px;
      font-size:18px;
      border:none;
      border-radius:30px;
      background:gold;
      color:black;
      cursor:pointer;
      transition:0.4s;
    }

    .register-btn:hover{
      background:orange;
      transform:scale(1.1);
    }

    /* Registration Section */
    .registration{
      padding:80px 20px;
      background:#111;
      text-align:center;
      animation:fadeUp 2s ease;
    }

    form{
      max-width:400px;
      margin:auto;
      display:flex;
      flex-direction:column;
      gap:20px;
    }

    input{
      padding:15px;
      border-radius:8px;
      border:none;
      font-size:16px;
    }

    button.submit-btn{
      padding:15px;
      background:gold;
      border:none;
      border-radius:30px;
      font-size:18px;
      cursor:pointer;
      transition:0.3s;
    }

    button.submit-btn:hover{
      background:orange;
      transform:scale(1.05);
    }

    /* Collaborators */
    .collaborators{
      padding:60px 20px;
      background:#000;
      text-align:center;
    }

    .clubs{
      margin-top:20px;
      display:flex;
      justify-content:center;
      flex-wrap:wrap;
      gap:20px;
    }

    .club{
      background:#222;
      padding:20px 30px;
      border-radius:10px;
      transition:0.4s;
    }

    .club:hover{
      background:gold;
      color:black;
      transform:scale(1.1);
    }

    footer{
      padding:20px;
      text-align:center;
      background:#111;
      font-size:14px;
    }

    @keyframes fadeIn{
      from{opacity:0;}
      to{opacity:1;}
    }

    @keyframes slideDown{
      from{transform:translateY(-50px);opacity:0;}
      to{transform:translateY(0);opacity:1;}
    }

    @keyframes fadeUp{
      from{transform:translateY(50px);opacity:0;}
      to{transform:translateY(0);opacity:1;}
    }

  </style>
</head>

<body>

  <!-- Hero Section -->
  <section class="hero">
    <div class="overlay"></div>
    <div class="hero-content">
      <h1>MAHABHARATAM</h1>
      <div class="details">
        <p>📍 AB2 - Auditorium</p>
        <p>⏰ 3PM to 6PM</p>
        <p>🎓 VITAP-Amaravati</p>
      </div>
      <button class="register-btn" onclick="document.getElementById('register').scrollIntoView();">
        Register Here
      </button>
    </div>
  </section>

  <!-- Registration Section -->
  <section id="register" class="registration">
    <h2 style="color:gold; margin-bottom:30px;">Register Now</h2>

    <form id="registrationForm">
      <input type="text" id="name" placeholder="Full Name" required>
      <input type="text" id="regno" placeholder="Registration Number" required>
      <input type="email" id="email" placeholder="Email ID" required>
      <button type="submit" class="submit-btn">Submit</button>
    </form>

    <p id="message" style="margin-top:20px;"></p>
  </section>

  <!-- Collaborators -->
  <section class="collaborators">
    <h2 style="color:gold;">Club Collaborators</h2>
    <div class="clubs">
      <div class="club">Dramatics Club</div>
      <div class="club">Cultural Club</div>
      <div class="club">Literary Club</div>
      <div class="club">Fine Arts Club</div>
    </div>
  </section>

  <footer>
    © 2026 Mahabharatam | VITAP-Amaravati
  </footer>

  <script>
    const supabaseUrl = "https://zhmazqothtpwrgmzermw.supabase.co";
    const supabaseKey = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InpobWF6cW90aHRwd3JnbXplcm13Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzIzMzY2MjgsImV4cCI6MjA4NzkxMjYyOH0.Fc1PDrH9oJiIrn8HanhhKi0DfI4sIqyOwEToAYb52yo";

    const { createClient } = supabase;
    const client = createClient(supabaseUrl, supabaseKey);

    document.getElementById("registrationForm").addEventListener("submit", async function(e){
      e.preventDefault();

      const name = document.getElementById("name").value;
      const regno = document.getElementById("regno").value;
      const email = document.getElementById("email").value;

      const { data, error } = await client
        .from("registrations")
        .insert([{ name: name, regno: regno, email: email }]);

      const message = document.getElementById("message");

      if(error){
        message.style.color = "red";
        message.innerText = "Error submitting registration!";
        console.error(error);
      } else {
        message.style.color = "lightgreen";
        message.innerText = "Registration Successful!";
        document.getElementById("registrationForm").reset();
      }
    });
  </script>

</body>
</html>
